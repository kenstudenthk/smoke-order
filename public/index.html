<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Order</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 8-bit floating background sprites -->
<div class="pixel-bg" aria-hidden="true">
  <div class="sprite sprite-star"></div>
  <div class="sprite sprite-heart"></div>
  <div class="sprite sprite-coin"></div>
  <div class="sprite sprite-ghost"></div>
  <div class="sprite sprite-coin sprite-coin2"></div>
  <div class="oneup-popup" id="oneUp">1UP!</div>

  <!-- static level scenery -->
  <div class="deco deco-cloud" style="left:8%"></div>
  <div class="deco deco-cloud deco-cloud2" style="left:55%"></div>
  <div class="deco deco-cloud" style="left:80%;top:18%"></div>
  <div class="deco deco-bush" style="left:20%"></div>
  <div class="deco deco-bush deco-bush2" style="left:68%"></div>
  <div class="deco deco-pipe" style="left:42%"></div>
</div>

<!-- Tab Bar -->
<div class="tab-bar" id="tabBar">
  <button class="add-tab-btn" onclick="addTab()" title="Add new shop tab">＋</button>
</div>

<!-- Main Content -->
<div class="main">
  <h2 id="shopTitle">🛒 Order Table</h2>

  <div class="controls">
    <input class="search-bar" type="text" id="search" placeholder="🔍 Search product..." oninput="render()">
    <button class="btn btn-green" onclick="openSummary()">📋 摘要</button>
    <button class="btn btn-amber" onclick="openCopyModal()">📥 Copy from tab</button>
    <button class="btn btn-red btn-sm item-box" onclick="clearAll()">Clear</button>
  </div>

  <div class="cat-tabs" id="catTabs"></div>

  <!-- Discount Panel -->
  <div class="discount-panel">
    <h3>🏷️ 折扣規則</h3>
    <div class="discount-row">
      <label>規則：</label>
      <select class="rule-select" id="discType" onchange="saveDiscount();renderDiscPreview()">
        <option value="none">無折扣</option>
        <option value="a">A：購買 ≥ X 件 → 每件 -$Y</option>
        <option value="b">B：購買 ≥ X 件 → 免費贈送 $Z 以下貨品 (N 件)</option>
      </select>
    </div>
    <div class="discount-row" id="discRowA" style="display:none">
      <label>購買 ≥</label>
      <input class="disc-input" type="number" id="dA_x" min="1" placeholder="X 件" oninput="saveDiscount();renderDiscPreview()">
      <label>件，每件 -$</label>
      <input class="disc-input" type="number" id="dA_y" min="0" placeholder="$Y" oninput="saveDiscount();renderDiscPreview()">
    </div>
    <div class="discount-row" id="discRowB" style="display:none">
      <label>購買 ≥</label>
      <input class="disc-input" type="number" id="dB_x" min="1" placeholder="X 件" oninput="saveDiscount();renderDiscPreview()">
      <label>件 → 免費贈送 $</label>
      <input class="disc-input" type="number" id="dB_z" min="0" placeholder="$Z" oninput="saveDiscount();renderDiscPreview()">
      <label>以下貨品，數量</label>
      <input class="disc-input" type="number" id="dB_n" min="1" placeholder="N" oninput="saveDiscount();renderDiscPreview()">
    </div>
    <div class="disc-preview" id="discPreview">無啟用折扣。</div>
  </div>

  <!-- Table -->
  <table>
    <thead>
      <tr>
        <th>☑</th><th>Product</th><th>Cat</th><th>Unit Price</th><th>Qty</th><th>Subtotal</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <!-- Summary Bar -->
  <div class="summary-bar">
    <div class="sum-item"><div class="sum-label">Selected</div><div class="sum-val" id="sumItems">0</div></div>
    <div class="sum-item"><div class="sum-label">Total Qty</div><div class="sum-val" id="sumQty">0</div></div>
    <div class="sum-item">
      <div class="sum-label">Total Price</div>
      <div class="sum-val" id="sumPrice">$0</div>
      <div class="disc-applied" id="discApplied"></div>
    </div>
    <button class="btn btn-red btn-sm item-box" onclick="clearAll()">Clear All</button>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-overlay" id="summaryModal">
  <div class="modal">
    <h3>📋 Order Summary</h3>
    <div class="modal-body" id="summaryBody"></div>
    <input class="edit-input" type="tel" id="waNumber" placeholder="WhatsApp 號碼 (e.g. 91234567)" style="margin:0 18px;width:auto">
    <div class="modal-footer">
      <button class="btn btn-green" onclick="sendWhatsApp()">💬 WhatsApp</button>
      <button class="btn btn-purple" onclick="copySummary()">📋 Copy</button>
      <button class="btn btn-red" onclick="closeModal('summaryModal')">Close</button>
    </div>
  </div>
</div>

<!-- Edit Price Modal -->
<div class="modal-overlay" id="editModal">
  <div class="edit-modal">
    <h3>✏️ Edit Price</h3>
    <div id="editProductName" style="color:#aaa;font-size:12px;margin-bottom:4px"></div>
    <input class="edit-input" type="number" id="editPriceInput" min="0" placeholder="New price">
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
      <button class="btn btn-amber" onclick="confirmEditPrice()">Save</button>
      <button class="btn btn-red" onclick="closeModal('editModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- Copy from Tab Modal -->
<div class="modal-overlay" id="copyModal">
  <div class="copy-modal">
    <h3>📥 Copy selections from another tab</h3>
    <select class="copy-select" id="copyFromSelect"></select>
    <p style="font-size:11px;color:#888">This will copy checked items and qty from the selected tab into the current tab.</p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-purple" onclick="confirmCopy()">Copy</button>
      <button class="btn btn-red" onclick="closeModal('copyModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
